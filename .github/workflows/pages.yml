# Publish the user manual (docs/manual/manuel.html) to GitHub Pages.
#
# The manual references images via ../../assets/ and sibling docs via ../*.md —
# paths that resolve only inside the repo tree. The build step assembles a
# self-contained site at the Pages root: the manual becomes index.html with
# image paths flattened to assets/ and cross-doc .md links rewritten to absolute
# github.com/blob URLs (see .github/scripts/build-pages.py).
#
# Result: https://sandjab.github.io/Iris/

name: Pages · manuel

on:
  push:
    branches: [main]
    paths:
      - "docs/manual/manuel.html"
      - "assets/iris-icon-256.png"
      - "assets/menubar-*.png"
      - ".github/scripts/build-pages.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Assemble site
        run: |
          mkdir -p _site/assets
          cp assets/iris-icon-256.png assets/menubar-*.png _site/assets/
          python3 .github/scripts/build-pages.py docs/manual/manuel.html _site/index.html

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
