name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install swift-format
        run: brew install swift-format

      - name: Lint
        run: swift-format lint --strict --recursive Sources Tests Package.swift IrisApp

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      # continue-on-error in 6.1: macos-14 runner Xcode may predate the project's
      # objectVersion 77 (Xcode 16+). Promote to a hard gate (and bump the runner) in 6.2.
      - name: Build IrisApp via xcodebuild
        continue-on-error: true
        run: |
          xcodebuild \
            -project IrisApp/IrisApp.xcodeproj \
            -scheme IrisApp \
            -destination "generic/platform=macOS" \
            -configuration Debug \
            build
