name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install swift-format
        run: brew install swift-format

      - name: Lint
        run: swift-format lint --strict --recursive Sources Tests Package.swift IrisApp

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  xcode-build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: xcodebuild -version

      - name: Build IrisApp via xcodebuild (hard gate)
        run: |
          xcodebuild \
            -project IrisApp/IrisApp.xcodeproj \
            -scheme IrisApp \
            -destination "generic/platform=macOS" \
            -configuration Debug \
            build
